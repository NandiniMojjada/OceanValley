<header [class]="'fixed top-0 inset-x-0 z-50 transition-all duration-500 ' +
    (scrolled() ? 'bg-background/80 backdrop-blur-xl border-b border-border/60 py-3' : 'py-6 bg-transparent')">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
    <!-- Logo -->
    <a href="#top" class="flex items-center gap-3 group">
      <div class="w-12 h-12 sm:w-20 sm:h-20 rounded-full flex items-center justify-center overflow-hidden bg-transparent shrink-0">
        <img src="logo.png" alt="Ocean Valley Landscaping logo" class="w-full h-full object-contain" />
      </div>
      <div class="leading-none">
        <div class="font-bebas text-3xl sm:text-4xl lg:text-[50px] font-extrabold tracking-wide text-[#046330]">Ocean Valley</div>
        <div class="font-bebas text-sm sm:text-lg lg:text-[25px] font-bold tracking-[0.05em] uppercase text-[#046330]">Landscaping L.L.C.
        </div>
      </div>
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden lg:flex items-center gap-10">
      @for (link of links; track link.href) {
      <a [href]="link.href"
        [class]="'text-sm tracking-wide transition-colors ' + (scrolled() ? 'text-foreground/80 hover:text-foreground' : 'text-cream/80 hover:text-gold')">{{
        link.label }}</a>
      }
      <a href="#contact"
        class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-gold text-[#333333] font-medium text-sm hover:bg-gold-soft transition-all shadow-gold">
        Free Consultation
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      </a>
    </nav>

    <!-- Mobile Menu Toggle -->
    <button class="lg:hidden" [class]="scrolled() ? 'text-foreground' : 'text-cream'" (click)="toggleNav()"
      aria-label="Toggle menu">
      @if (navOpen()) {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
      } @else {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <line x1="4" x2="20" y1="12" y2="12" />
        <line x1="4" x2="20" y1="6" y2="6" />
        <line x1="4" x2="20" y1="18" y2="18" />
      </svg>
      }
    </button>
  </div>

  <!-- Mobile Menu Dropdown -->
  @if (navOpen()) {
  <div class="lg:hidden absolute top-full inset-x-0 bg-background border-b border-border shadow-luxe">
    <div class="px-6 py-6 flex flex-col gap-4">
      @for (link of links; track link.href) {
      <a [href]="link.href" (click)="closeNav()" class="text-foreground/80 hover:text-foreground transition-colors">{{
        link.label }}</a>
      }
      <a href="#contact" (click)="closeNav()"
        class="px-5 py-3 rounded-full bg-gold text-forest-deep text-center font-medium">
        Free Consultation
      </a>
    </div>
  </div>
  }
</header>
