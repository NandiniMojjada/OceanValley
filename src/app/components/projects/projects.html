<section id="projects" class="py-24 sm:py-32 bg-background">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-center max-w-2xl mx-auto mb-14">
      <p class="text-xs tracking-[0.4em] uppercase text-forest mb-4">Selected Work</p>
      <h2 class="font-display text-4xl sm:text-5xl text-forest-deep">A portfolio of considered landscapes.</h2>
    </div>

    <!-- Filter Buttons -->
    <div class="flex flex-wrap justify-center gap-2 mb-12">
      @for (f of filters; track f) {
        <button
          (click)="setFilter(f)"
          [class]="'px-5 py-2 rounded-full text-sm tracking-wide transition-all ' +
            (activeFilter() === f ? 'bg-forest text-cream' : 'border border-border text-foreground/70 hover:border-forest/40')"
        >{{ f }}</button>
      }
    </div>

    <!-- Project Grid -->
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (project of filteredProjects; track trackByTitle($index, project); let i = $index) {
        <a
          href="#contact"
          [class]="'group relative block overflow-hidden rounded-sm bg-muted ' +
            (i % 5 === 0 ? 'sm:col-span-2 sm:row-span-2 aspect-[4/3] sm:aspect-auto' : 'aspect-[4/3]')"
        >
          <img
            [src]="project.img"
            [alt]="project.title"
            loading="lazy"
            class="w-full h-full object-cover transition-transform duration-[1500ms] group-hover:scale-105"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-forest-deep/90 via-forest-deep/20 to-transparent opacity-90 group-hover:opacity-100 transition-opacity"></div>
          <div class="absolute inset-0 p-8 flex flex-col justify-end text-cream">
            <div class="text-xs tracking-[0.3em] uppercase text-gold mb-2">{{ project.cat }}</div>
            <h3 class="font-display text-2xl sm:text-3xl">{{ project.title }}</h3>
            <div class="mt-4 inline-flex items-center gap-2 text-sm opacity-0 -translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-500">
              View Project
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
            </div>
          </div>
        </a>
      }
    </div>
  </div>
</section>
